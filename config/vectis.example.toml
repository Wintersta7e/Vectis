# Vectis Configuration
# Copy this to vectis.toml alongside the binary and customize.
# All settings have sensible defaults — this file is optional.

[general]
# Data directory (relative to binary or absolute path)
data_dir = "./vectis-data"

# --- Code scanning ---
[code]
# Languages to parse (or "auto" to detect from file extensions)
languages = ["auto"]

# Extra directory names to exclude in addition to the built-in
# defaults (virtualenvs, build outputs, caches, VCS metadata, IDE
# dirs). Your project's `.gitignore` is already layered on top.
exclude = []

[code.digest]
# What to include in agent digest exports
include_signatures = true
include_hotspots = true
max_depth = 3
